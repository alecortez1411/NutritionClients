<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan Nutricional - Denise A.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <!-- Header -->
    <header class="bg-emerald-600 text-white pt-12 pb-24 px-6 relative overflow-hidden shadow-md">
        <div class="max-w-6xl mx-auto relative z-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-8">
            <div>
                <h1 class="text-3xl md:text-4xl font-bold mb-2 tracking-tight">Alejandra Cortez</h1>
                <p class="text-emerald-100 flex items-center gap-2 mb-1"><i data-lucide="user" class="w-4 h-4"></i> Nutricionista</p>
                <div class="flex flex-col sm:flex-row gap-3 sm:gap-6 text-sm text-emerald-50 mt-4">
                    <span class="flex items-center gap-1.5"><i data-lucide="phone" class="w-4 h-4"></i> +1 [314] 371-9265</span>
                    <span class="flex items-center gap-1.5"><i data-lucide="mail" class="w-4 h-4"></i> alecortez.14.11@gmail.com</span>
                </div>
            </div>
            
            <div class="bg-white/10 backdrop-blur-md border border-white/20 p-5 rounded-2xl w-full md:w-auto min-w-[300px]">
                <h2 class="text-sm uppercase tracking-wider text-emerald-100 font-semibold mb-3">Información del Cliente</h2>
                <p class="font-bold text-xl mb-1">Denise A.</p>
                <div class="grid grid-cols-2 gap-4 text-sm mt-3">
                    <div class="flex items-center gap-2"><span><span class="text-emerald-200/80">Edad:</span> 40 años</span></div>
                    <div class="flex items-center gap-2"><span><span class="text-emerald-200/80">Altura:</span> 5' 1.4"</span></div>
                    <div class="flex items-center gap-2"><span><span class="text-emerald-200/80">Peso:</span> 218.0 lb</span></div>
                    <div class="flex items-center gap-2"><span><span class="text-emerald-200/80">BMI:</span> 40.6</span></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 md:px-12 -mt-10 relative z-20">
        <!-- Day Selector -->
        <section class="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden mb-12">
            <div class="bg-slate-50 border-b border-slate-200 p-2 sm:p-4 overflow-x-auto no-scrollbar">
                <div class="flex space-x-2 min-w-max" id="day-tabs">
                    <!-- Tabs generated by JS -->
                </div>
            </div>

            <div class="p-4 sm:p-8">
                <h3 id="current-day-title" class="text-2xl font-bold text-slate-800 mb-6">Menú</h3>
                <div id="meals-container" class="space-y-6">
                    <!-- Meals generated by JS -->
                </div>
            </div>
        </section>

        <!-- Recipes -->
        <section>
            <div class="flex items-center gap-3 mb-8 px-2">
                <div class="p-3 bg-emerald-100 text-emerald-600 rounded-xl"><i data-lucide="book-open"></i></div>
                <h2 class="text-2xl md:text-3xl font-bold text-slate-800">Recetas Sugeridas</h2>
            </div>
            <div id="recipes-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Recipes generated by JS -->
            </div>
        </section>
    </main>

    <script>
        const dietPlan = {
            Lunes: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["1 portion of fruit with cottage cheese (250 g)"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["100 grams of apple"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["1 portion of mexican Deconstructed Burrito Bowl (567 g)"], notes: "avocado toast con huevos revueltos y queso mozarella" },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["1 cup [8 fl oz] of yogurt, vanilla, non-fat (245 g)", "100 grams of apple"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["1 portion of ensalada de Pollo (588 g)"] }
            ],
            Martes: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["2 large units of egg, whole, raw, fresh (100 g)", "2 slices of bread, whole-wheat, commercially prepared (64 g)", "1/2 avocado (68 g)", "16g mozzarella"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["10 almonds (12 g)"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["1 portion of ensalada de Pollo (588 g)"] },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["1 cup pineapple chunks (165 g)"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["3 oz grilled chicken breast", "1/2 cup brown rice", "1/2 cup broccoli", "1 sweet potato"] }
            ],
            Miércoles: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["1 cup papaya (145 g)", "2 boiled eggs"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["1 cup pineapple (165 g)"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["1 portion of ensalada de Atun (477 g)"] },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["1 cup papaya (145 g)", "1 cup yogurt (245 g)"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["100g chicken fajitas", "1/2 cup brown rice", "100g black beans"], notes: "Podes reemplazar hummus con pollo" }
            ],
            Jueves: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["1 banana Breakfast Smoothie (226 g)"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["1 oz walnuts (28 g)"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["1 flour tortilla", "2 slices turkey", "1/4 cup mozzarella", "1/2 avocado"] },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["100g apple"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["1 portion spaghetti Bolognese", "1 portion green Salad"], notes: "La ensalada tiene espinaca la podes quitar" }
            ],
            Viernes: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["2 scrambled eggs", "2 slices turkey", "1 slice whole-wheat bread"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["1/2 cup ricotta", "1/2 cup blueberries"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["3 oz grilled chicken", "1 cup roasted veggies"] },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["1 cup yogurt"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["1 slice cheese pizza", "1 portion cucumber salad"] }
            ],
            Sábado: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["1 portion pecan Maple Oatmeal (116 g)"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["1 medium apple"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["1 portion Garlic Butter Salmon with Potatoes & Asparagus"] },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["2 tbsp peanut butter", "100g apple"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["1 Turkey Sandwich with Avocado", "1/2 cup blueberries"] }
            ],
            Domingo: [
                { type: "Desayuno", time: "07:00 AM", icon: "coffee", items: ["1 orange", "1 jar Overnight Oats"] },
                { type: "Snack de la Mañana", time: "10:00 AM", icon: "apple", items: ["1 cup carrots", "Lime juice"] },
                { type: "Almuerzo", time: "12:00 PM", icon: "utensils", items: ["3 oz beef sirloin", "1/2 cup broccoli", "1 cup scalloped potatoes"] },
                { type: "Snack de la Tarde", time: "04:00 PM", icon: "apple", items: ["1 cup popcorn (air-popped)"] },
                { type: "Cena", time: "07:00 PM", icon: "utensils", items: ["1 portion Yogurt Banana Sundae", "2 corn tortillas", "1/2 cup queso fresco"] }
            ]
        };

        const recipes = [
            {
                title: "BANANA BREAKFAST SMOOTHIE",
                author: "Aoife Quinn",
                ingredients: ["1/2 cup skim milk", "1/2 tbsp honey", "1/4 cup rolled Oats", "1/2 tsp cinnamon", "1 Small Banana", "1 scoop Protein Powder"],
                instructions: ["Add all ingredients to a blender and mix. Add extra milk for lighter consistency."]
            },
            {
                title: "MEXICAN DECONSTRUCTED BURRITO BOWL",
                author: "Melissa gundersen",
                description: "Perfect for meal prep. Easy to add chicken if desired.",
                ingredients: ["3 cups quinoa, cooked", "1.5 cups black beans", "1 cup corn", "1/2 cup cilantro", "Lime juice", "2 heads lettuce", "1/2 cup salsa", "2.5 avocados"],
                instructions: ["Prepare quinoa. Combine with beans, corn, cilantro, cumin, salt, and lime juice.", "Divide into 5 containers with lettuce, salsa, and avocado."]
            },
            {
                title: "TIK TOK CUCUMBER SALAD",
                author: "Sarah Gouws",
                ingredients: ["1/2 cucumber", "1/2 tsp sesame oil", "1 tbsp rice vinegar", "2 tbsp soy sauce", "1 spring onion", "1 tsp sesame seeds"],
                instructions: ["Dice the cucumber.", "Whisk dressing ingredients together. Pour over cucumber.", "Mix with onions and sprinkle sesame seeds."]
            },
            {
                title: "GARLIC BUTTER-ROASTED SALMON",
                author: "Eszter Halas",
                ingredients: ["1 lb baby potatoes", "2 tbsp olive oil", "12 oz asparagus", "2 tbsp butter", "1 tbsp lemon juice", "2 cloves garlic", "1.5 lbs salmon"],
                instructions: ["Roast potatoes (400F/15m).", "Toss asparagus with oil.", "Mix butter, lemon, and garlic.", "Add salmon and asparagus to pan, drizzle with butter and roast 10-12 mins."]
            }
        ];

        let activeDay = "Lunes";

        function renderTabs() {
            const container = document.getElementById('day-tabs');
            container.innerHTML = Object.keys(dietPlan).map(day => `
                <button onclick="setDay('${day}')" class="px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 ${activeDay === day ? 'bg-emerald-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-emerald-50'}">
                    ${day}
                </button>
            `).join('');
        }

        function renderMeals() {
            document.getElementById('current-day-title').innerText = `Menú del ${activeDay}`;
            const container = document.getElementById('meals-container');
            container.innerHTML = dietPlan[activeDay].map(meal => `
                <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-lg text-emerald-800">${meal.type}</h4>
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-semibold whitespace-nowrap">${meal.time}</span>
                    </div>
                    <ul class="space-y-2 mb-3">
                        ${meal.items.map(item => `<li class="text-slate-600 text-sm flex items-start"><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full mt-1.5 mr-2.5 shrink-0"></span>${item}</li>`).join('')}
                    </ul>
                    ${meal.notes ? `<div class="mt-4 p-3 bg-amber-50 border border-amber-100 rounded-xl text-xs text-amber-800 italic">Nota: ${meal.notes}</div>` : ''}
                </div>
            `).join('');
        }

        function renderRecipes() {
            const container = document.getElementById('recipes-container');
            container.innerHTML = recipes.map((recipe, index) => `
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6">
                        <h3 class="font-bold text-lg text-slate-800 mb-1">${recipe.title}</h3>
                        <p class="text-xs text-slate-400 font-bold uppercase mb-4">Por ${recipe.author}</p>
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-[10px] font-black text-emerald-600 uppercase mb-2">Ingredientes</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${recipe.ingredients.map(ing => `<span class="text-[10px] bg-slate-50 border border-slate-100 px-2 py-1 rounded-md text-slate-600">${ing}</span>`).join('')}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-[10px] font-black text-emerald-600 uppercase mb-2">Preparación</h4>
                                <ul class="space-y-1">
                                    ${recipe.instructions.map((inst, i) => `<li class="text-xs text-slate-500 flex gap-2"><span class="font-bold text-emerald-600">${i+1}.</span> ${inst}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setDay(day) {
            activeDay = day;
            renderTabs();
            renderMeals();
        }

        // Initialize
        window.onload = () => {
            renderTabs();
            renderMeals();
            renderRecipes();
            lucide.createIcons();
        };
    </script>
</body>
</html>
