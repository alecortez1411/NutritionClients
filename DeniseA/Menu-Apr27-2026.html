        let activeDay = "Lunes";

        function renderTabs() {
            const container = document.getElementById('day-tabs');
            container.innerHTML = Object.keys(dietPlan).map(day => `
                <button onclick="setDay('${day}')" class="px-5 py-2.5 rounded-full text-sm font-medium transition-all duration-200 ${activeDay === day ? 'bg-emerald-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 hover:bg-emerald-50'}">
                    ${day}
                </button>
            `).join('');
        }

        function renderMeals() {
            document.getElementById('current-day-title').innerText = `Menú del ${activeDay}`;
            const container = document.getElementById('meals-container');
            container.innerHTML = dietPlan[activeDay].map(meal => `
                <div class="bg-white border border-slate-100 rounded-2xl p-5 shadow-sm">
                    <div class="flex justify-between items-start mb-3">
                        <h4 class="font-bold text-lg text-emerald-800">${meal.type}</h4>
                        <span class="px-3 py-1 bg-slate-100 text-slate-600 rounded-full text-xs font-semibold whitespace-nowrap">${meal.time}</span>
                    </div>
                    <ul class="space-y-2 mb-3">
                        ${meal.items.map(item => `<li class="text-slate-600 text-sm flex items-start"><span class="w-1.5 h-1.5 bg-emerald-400 rounded-full mt-1.5 mr-2.5 shrink-0"></span>${item}</li>`).join('')}
                    </ul>
                    ${meal.notes ? `<div class="mt-4 p-3 bg-amber-50 border border-amber-100 rounded-xl text-xs text-amber-800 italic">Nota: ${meal.notes}</div>` : ''}
                </div>
            `).join('');
        }

        function renderRecipes() {
            const container = document.getElementById('recipes-container');
            container.innerHTML = recipes.map((recipe, index) => `
                <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden">
                    <div class="p-6">
                        <h3 class="font-bold text-lg text-slate-800 mb-1">${recipe.title}</h3>
                        <p class="text-xs text-slate-400 font-bold uppercase mb-4">Por ${recipe.author}</p>
                        <div class="space-y-4">
                            <div>
                                <h4 class="text-[10px] font-black text-emerald-600 uppercase mb-2">Ingredientes</h4>
                                <div class="flex flex-wrap gap-2">
                                    ${recipe.ingredients.map(ing => `<span class="text-[10px] bg-slate-50 border border-slate-100 px-2 py-1 rounded-md text-slate-600">${ing}</span>`).join('')}
                                </div>
                            </div>
                            <div>
                                <h4 class="text-[10px] font-black text-emerald-600 uppercase mb-2">Preparación</h4>
                                <ul class="space-y-1">
                                    ${recipe.instructions.map((inst, i) => `<li class="text-xs text-slate-500 flex gap-2"><span class="font-bold text-emerald-600">${i+1}.</span> ${inst}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setDay(day) {
            activeDay = day;
            renderTabs();
            renderMeals();
        }

        // Initialize
        window.onload = () => {
            renderTabs();
            renderMeals();
            renderRecipes();
            lucide.createIcons();
        };
    </script>
</body>
</html>
